services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auc-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      WORKERS_COUNT: ${WORKERS_COUNT:-2}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-10000}
      MAX_CONCURRENT_URLS: ${MAX_CONCURRENT_URLS:-5}
      URL_DELAY_MAX_SECONDS: ${URL_DELAY_MAX_SECONDS:-10}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/jobs').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: auc-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
